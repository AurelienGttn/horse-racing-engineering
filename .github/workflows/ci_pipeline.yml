name: dbt_ci_pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate Mock Data
        run: |
          # Run the script using the full path from the repo root
          python scripts/fetch_pmu_data.py

      - name: Inspect Data
        run: |
          echo "--- RAW CSV PREVIEW ---"
          head -n 5 data/raw/races.csv
          echo "--- TOTAL ROW COUNT ---"
          wc -l data/raw/races.csv

      - name: Run dbt
        run: |
          cd horse_racing_dbt
          dbt deps
          dbt run
          dbt test

      - name: Upload processed data
        uses: actions/upload-artifact@v7
        with:
          name: horse_racing_results
          path: |
            data/raw/races.csv
            horse_racing_dbt/dev.duckdb