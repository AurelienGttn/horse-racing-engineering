name: dbt_ci_pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  
permissions:
  contents: write # Needed to push to gh-pages branch for documentation

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate Data
        run: |
          # Run the script using the full path from the repo root
          python scripts/fetch_pmu_data.py

      - name: Inspect Data
        run: |
          echo "--- RAW CSV PREVIEW ---"
          head -n 5 data/raw/races.csv
          echo "--- TOTAL ROW COUNT ---"
          wc -l data/raw/races.csv

      - name: Run dbt
        run: |
          cd horse_racing_dbt
          dbt deps
          dbt run
          dbt test
          dbt docs generate
          # Copy files to a 'docs' folder at the ROOT so the next step finds them easily
          mkdir -p ../public_docs
          cp target/*.json ../public_docs/
          cp target/index.html ../public_docs/

      - name: Show me the Gold!
        run: |
          # 1. Find the file anywhere in the workspace
          DB_FILE=$(find ${{ github.workspace }} -name "*.duckdb" | head -n 1)
          
          if [ -z "$DB_FILE" ]; then
            echo "❌ STILL NO DUCKDB FILE FOUND!"
            echo "Listing all files in the current directory to see what happened:"
            ls -R
            exit 1
          fi

          echo "✅ Found database at: $DB_FILE"
          
          # 2. Query it using Python
          python -c "
          import duckdb
          import os
          
          db_path = '$DB_FILE'
          conn = duckdb.connect(db_path)
          
          print('\n--- Mart Venue Stats ---')
          try:
              # Use the full path main.mart_venue_stats
              df = conn.execute('SELECT * FROM main.mart_venue_stats LIMIT 10').df()
              print(df.to_markdown()) # to_markdown looks better in logs if you have tabulate installed, otherwise use print(df)
          except Exception as e:
              print(f'❌ Query failed: {e}')
              # Let's see what tables DO exist
              print('\n--- Available Tables ---')
              print(conn.execute('SHOW TABLES').df())
          "
          
      - name: Deploy Docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public_docs
          force_orphan: true

      - name: Download Database
        uses: actions/upload-artifact@v7
        with:
          name: horse-racing-db
          path: horse-racing-engineering/horse_racing_dbt/dev.duckdb