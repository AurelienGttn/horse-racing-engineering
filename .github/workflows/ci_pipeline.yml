name: dbt_ci_pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  
permissions:
  contents: write # Needed to push to gh-pages branch for documentation

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate Data
        run: |
          # Run the script using the full path from the repo root
          python scripts/fetch_pmu_data.py

      - name: Inspect Data
        run: |
          echo "--- RAW CSV PREVIEW ---"
          head -n 5 data/raw/races.csv
          echo "--- TOTAL ROW COUNT ---"
          wc -l data/raw/races.csv

      - name: Run dbt
        run: |
          cd horse_racing_dbt
          dbt deps
          dbt run
          dbt test
          dbt docs generate
          # Copy files to a 'docs' folder at the ROOT so the next step finds them easily
          mkdir -p ../public_docs
          cp target/*.json ../public_docs/
          cp target/index.html ../public_docs/

      - name: Show me the Gold!
        run: |
          python -c "
          import duckdb
          import os
          
          # This uses the environment variable provided by GitHub to find the absolute path
          workspace = os.getenv('GITHUB_WORKSPACE')
          db_path = os.path.join(workspace, 'horse_racing_dbt/dev.duckdb')
          
          if not os.path.exists(db_path):
              print(f'❌ Database file not found at {db_path}')
              # List files to help us find where it actually is
              print('Directory contents:')
              os.system('find . -maxdepth 3 -name \"*.duckdb\"')
              exit(1)
              
          conn = duckdb.connect(db_path)
          print('\n--- Mart Venue Stats ---')
          print(conn.execute('SELECT * FROM main.mart_venue_stats LIMIT 10').df())
          "
          
      - name: Deploy Docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public_docs
          force_orphan: true

      - name: Download Database
        uses: actions/upload-artifact@v7
        with:
          name: horse-racing-db
          path: horse-racing-engineering/horse_racing_dbt/dev.duckdb