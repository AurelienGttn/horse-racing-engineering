name: dbt_ci_pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate Mock Data
        run: |
          # Run the script using the full path from the repo root
          python scripts/generate_mock_data.py

      - name: Run dbt
        run: |
          cd horse_racing_dbt
          dbt deps
          dbt run
          dbt test