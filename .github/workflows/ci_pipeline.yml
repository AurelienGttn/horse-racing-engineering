name: dbt_ci_pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    # This is the magic fix:
    defaults:
      run:
        working-directory: horse-racing-engineering

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Ensure it checks out into the current dir without extra nesting
          path: horse-racing-engineering

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Tell python where to find requirements
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Mock Data
        run: |
          mkdir -p data/raw
          python scripts/generate_mock_data.py

      - name: Run dbt
        env:
          DBT_PROFILES_DIR: ./horse_racing_dbt
        run: |
          cd horse_racing_dbt
          dbt deps
          dbt run --target dev
          dbt test --target dev