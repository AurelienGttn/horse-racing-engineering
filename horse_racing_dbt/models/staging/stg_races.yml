version: 2

models:
  - name: stg_races
    columns:
      - name: unique_race_key
        description: "Surrogate key generated by hashing date, reunion, and race number."
        tests:
          - unique
          - not_null

      - name: pmu_race_id
        description: "Primary key from PMU data source"
        tests:
          - not_null

      - name: race_date
        description: "The calendar date the race occurred"
        tests:
          - not_null

      - name: venue
        description: "The full name of the hippodrome (e.g., PARIS-VINCENNES)"

      - name: country
        description: "The country where the race took place"

      - name: weather
        description: "Weather conditions at the time of the reunion (e.g., Beau fixe, Pluie)"

      - name: discipline
        description: "The type of racing (e.g., TROT ATTELE, GALOP)"
        tests:
          - accepted_values:
              values: ['TROT ATTELE', 'TROT MONTE', 'PLAT', 'OBSTACLE', 'HAIES', 'STEEPLE-CHASE', 'Unknown']
              quote: true

      - name: prize_money
        description: "Total prize pool in Euros"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

      - name: runners_count
        description: "Number of horses participating in the race"
        tests:
          - not_null

      - name: is_quinte
        description: "Binary flag (1/0) indicating if the race was the featured Quinté+ of the day"

      - name: insterted_at
        description: "Timestamp of when the record was inserted into the database"