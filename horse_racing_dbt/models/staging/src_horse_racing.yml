version: 2

sources:
  - name: raw_horse_racing
    schema: main
    description: "Raw horse racing data from Python mock script"
    tables:
      - name: mock_races
        description: "Mock metadata for each race event"
        # We use a relative path to find the CSV we generated earlier
        external_location: "read_csv_auto('../data/raw/mock_races.csv')"

      - name: races
        description: "Metadata for each race event"
        # Path to the CSV file generated by the fetch_pmu_data.py script
        external_location: "read_csv_auto('../data/raw/races.csv')"